---
- name: Deploy Backend Container
  hosts: application
  become: yes

  tasks:

    - name: Pull latest backend image
      docker_image:
        name: badhrinarayanan26/backend
        source: pull

    - name: Stop old backend container
      ignore_errors: yes
      shell: docker rm -f backend-container

    - name: Run backend container
      shell: |
        docker run -d \
        --name backend-container \
        -p 5000:5000 \
        badhrinarayanan26/backend:latest
